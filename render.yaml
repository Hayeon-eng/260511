version: 1

services:
  - type: web
    name: aeo-lab
    runtime: python
    plan: free
    autoDeploy: true

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: |
      uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: DB_PATH
        value: /tmp/discussion.db
      # GEMINI_API_KEY는 Render 대시보드에서 직접 추가 (보안)
