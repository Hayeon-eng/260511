<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEO Lab · AI 토론 플랫폼</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="/css/00-root-base.css">
<link rel="stylesheet" href="/css/01-layout.css">
<link rel="stylesheet" href="/css/02-sidebar.css">
<link rel="stylesheet" href="/css/03-main.css">
<link rel="stylesheet" href="/css/04-modal.css">
<link rel="stylesheet" href="/css/05-segmented-control.css">
<link rel="stylesheet" href="/css/06-compare-card.css">
<link rel="stylesheet" href="/css/07-vs-row.css">
<link rel="stylesheet" href="/css/08-right-panel-compare-grid.css">
<link rel="stylesheet" href="/css/09-export-menu-dropdown.css">
<link rel="stylesheet" href="/css/10-zones.css">
<link rel="stylesheet" href="/css/11-diagnosis-zone.css">
<link rel="stylesheet" href="/css/12-round-divider.css">
<link rel="stylesheet" href="/css/13-turn-card-v2.css">
<link rel="stylesheet" href="/css/14-right-panel-sharp-insights.css">
<link rel="stylesheet" href="/css/15-persona-modal.css">
<link rel="stylesheet" href="/css/16-ask-bar.css">
<link rel="stylesheet" href="/css/17-exec-cta.css">
<link rel="stylesheet" href="/css/18-exec-summary-modal.css">
</head>
<body>

<button class="mobile-menu" onclick="document.getElementById('sidebar').classList.toggle('show')">☰</button>

<div id="app">

  <!-- ============ Sidebar ============ -->
  <aside id="sidebar">
    <div class="brand">
      <div class="brand-logo">A</div>
      <div>
        <div class="brand-name">AEO Lab</div>
        <div class="brand-tag">AI 토론 플랫폼</div>
      </div>
    </div>

    <button class="new-session-btn" onclick="openNewSessionModal()">
      <span>+</span><span>새 토론 시작</span>
    </button>

    <div class="side-section" style="flex-shrink: 0">
      <div class="side-section-header">
        <span class="side-section-title">토론 히스토리</span>
      </div>
      <div id="session_list" class="session-list">
        <div class="empty-mini">아직 토론이 없습니다</div>
      </div>
    </div>

    <div class="side-section" style="flex: 1; display: flex; flex-direction: column; min-height: 0">
      <div class="side-section-header">
        <span class="side-section-title">페르소나 라이브러리</span>
        <button class="side-add-btn" onclick="openPersonaModal()">+</button>
      </div>
      <div id="persona_list_side" class="persona-list-side">
        <div class="empty-mini">로딩 중...</div>
      </div>
    </div>
  </aside>

  <!-- ============ Main ============ -->
  <main id="main">
    <div class="main-inner" id="main_inner">
      <!-- 콘텐츠가 동적으로 들어감 -->
    </div>
  </main>

  <!-- ============ Right Panel ============ -->
  <aside id="rightpanel">
    <div id="rp_content">
      <div class="rp-empty">
        토론을 시작하면<br>여기에 분석과 라이브 요약이 표시됩니다.
      </div>
    </div>
  </aside>
</div>

<!-- ============ Modal Container ============ -->
<div id="modal_root"></div>

<script src="/js/00-state.js"></script>
<script src="/js/01-init.js"></script>
<script src="/js/02-sidebar.js"></script>
<script src="/js/03-welcome.js"></script>
<script src="/js/04-session-render.js"></script>
<script src="/js/05-diagnosis-zone.js"></script>
<script src="/js/06-right-panel.js"></script>
<script src="/js/07-turn-execution.js"></script>
<script src="/js/08-followup.js"></script>
<script src="/js/09-executive-summary.js"></script>
<script src="/js/10-new-session-modal.js"></script>
<script src="/js/11-persona-modal.js"></script>
<script src="/js/12-helpers.js"></script>
</body>
</html>
