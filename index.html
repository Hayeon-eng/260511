<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEO Lab · AI 토론 플랫폼</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="/assets/css_00_root_base.css">
<link rel="stylesheet" href="/assets/css_01_layout.css">
<link rel="stylesheet" href="/assets/css_02_sidebar.css">
<link rel="stylesheet" href="/assets/css_03_main.css">
<link rel="stylesheet" href="/assets/css_04_modal.css">
<link rel="stylesheet" href="/assets/css_05_segmented_control.css">
<link rel="stylesheet" href="/assets/css_06_compare_card.css">
<link rel="stylesheet" href="/assets/css_07_vs_row.css">
<link rel="stylesheet" href="/assets/css_08_right_panel_compare_grid.css">
<link rel="stylesheet" href="/assets/css_09_export_menu_dropdown.css">
<link rel="stylesheet" href="/assets/css_10_zones.css">
<link rel="stylesheet" href="/assets/css_11_diagnosis_zone.css">
<link rel="stylesheet" href="/assets/css_12_round_divider.css">
<link rel="stylesheet" href="/assets/css_13_turn_card_v2.css">
<link rel="stylesheet" href="/assets/css_14_right_panel_sharp_insights.css">
<link rel="stylesheet" href="/assets/css_15_persona_modal.css">
<link rel="stylesheet" href="/assets/css_16_ask_bar.css">
<link rel="stylesheet" href="/assets/css_17_exec_cta.css">
<link rel="stylesheet" href="/assets/css_18_exec_summary_modal.css">
</head>
<body>

<button class="mobile-menu" onclick="document.getElementById('sidebar').classList.toggle('show')">☰</button>

<div id="app">

  <!-- ============ Sidebar ============ -->
  <aside id="sidebar">
    <div class="brand">
      <div class="brand-logo">A</div>
      <div>
        <div class="brand-name">AEO Lab</div>
        <div class="brand-tag">AI 토론 플랫폼</div>
      </div>
    </div>

    <button class="new-session-btn" onclick="openNewSessionModal()">
      <span>+</span><span>새 토론 시작</span>
    </button>

    <div class="side-section" style="flex-shrink: 0">
      <div class="side-section-header">
        <span class="side-section-title">토론 히스토리</span>
      </div>
      <div id="session_list" class="session-list">
        <div class="empty-mini">아직 토론이 없습니다</div>
      </div>
    </div>

    <div class="side-section" style="flex: 1; display: flex; flex-direction: column; min-height: 0">
      <div class="side-section-header">
        <span class="side-section-title">페르소나 라이브러리</span>
        <button class="side-add-btn" onclick="openPersonaModal()">+</button>
      </div>
      <div id="persona_list_side" class="persona-list-side">
        <div class="empty-mini">로딩 중...</div>
      </div>
    </div>
  </aside>

  <!-- ============ Main ============ -->
  <main id="main">
    <div class="main-inner" id="main_inner">
      <!-- 콘텐츠가 동적으로 들어감 -->
    </div>
  </main>

  <!-- ============ Right Panel ============ -->
  <aside id="rightpanel">
    <div id="rp_content">
      <div class="rp-empty">
        토론을 시작하면<br>여기에 분석과 라이브 요약이 표시됩니다.
      </div>
    </div>
  </aside>
</div>

<!-- ============ Modal Container ============ -->
<div id="modal_root"></div>

<script src="/assets/js_00_state.js"></script>
<script src="/assets/js_01_init.js"></script>
<script src="/assets/js_02_sidebar.js"></script>
<script src="/assets/js_03_welcome.js"></script>
<script src="/assets/js_04_session_render.js"></script>
<script src="/assets/js_05_diagnosis_zone.js"></script>
<script src="/assets/js_06_right_panel.js"></script>
<script src="/assets/js_07_turn_execution.js"></script>
<script src="/assets/js_08_followup.js"></script>
<script src="/assets/js_09_executive_summary.js"></script>
<script src="/assets/js_10_new_session_modal.js"></script>
<script src="/assets/js_11_persona_modal.js"></script>
<script src="/assets/js_12_helpers.js"></script>
</body>
</html>
